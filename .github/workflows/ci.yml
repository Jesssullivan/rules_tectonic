name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ matrix.os }}-${{ hashFiles('MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-${{ matrix.os }}-

      - name: Install bazelisk
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install bazelisk
          else
            sudo curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
            sudo chmod +x /usr/local/bin/bazel
          fi

      - name: Build everything
        run: bazel build //...

      - name: Test everything
        run: bazel test //...

      - name: Check generated API docs
        run: bazel test //docs:defs_doc_test

      - name: Check Bazel formatting
        run: bazel run //:buildifier.check

      - name: Build the example PDF
        run: bazel build //examples:hello

      - name: Build the bzlmod consumer smoke module
        working-directory: e2e/bzlmod
        run: bazel build //...

      - name: Test the bzlmod consumer smoke module
        working-directory: e2e/bzlmod
        run: bazel test //...

      - name: Verify PDF output
        run: |
          PDF=$(bazel cquery //examples:hello --output=files)
          test -s "$PDF"
          file "$PDF" | grep -q "PDF document"
